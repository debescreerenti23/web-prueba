<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pruebas</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            background-color: aquamarine;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        #head h1 {
            text-align: center;
        }

        #head-text {
            text-align: center;
        }

        #head-text span {
            font-style: oblique;
            color: coral;
        }

        #content {
            border-style: groove;
            border-radius: 20px;
            border-color: black;
            padding: 10px;
            width: 400px;
            margin: 0 auto; /* 0 arriba/abajo, auto a los lados (esto centra) */
            background-color: rgb(197, 186, 186); /* Opcional: para que se vea mejor la tarjeta */
            text-align: center; /* Esto centra el texto, input y botón dentro de la tarjeta */
            transition: all 0.3s ease; /* Esto hace que el cambio no sea brusco */
            cursor: pointer;
            
        }

        #content:hover {
            background-color: #e0fffb; /* El color que quieras al pasar el ratón */
    
            /* ELEVACIÓN: Movemos la tarjeta 10 píxeles hacia arriba en el eje Y */
            transform: translateY(-10px); 
    
            /* SOMBRA: Añadimos una sombra para reforzar el efecto de altura */
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
        }

        #input-content {
            justify-content: center;
            margin: 10px;
            padding: 5px;
        }

        #content button:hover {
            background-color: aqua;
        }

        #content input, button {
            border-radius: 8px;
        }

    </style>
</head>
<body>
    <div id="head">
        <h1>Web de pruebas varias sobre lo que hemos aprendido</h1>
    </div>
    
    <hr>

    <div id="head-text">
        <p>En esta web vamos a hacer pruebas tanto con <span>html, css y javascript</span>. Nos va a servir para aclarar conceptos de todo tipo</p>
    </div>

    <div id="content">
        <input type="text" id="input-content" placeholder="Inserta tu texto...">
        <button onclick="enviar()">Enviar contenido</button>
        <p id="p-text"></p>
    </div>
    
    <script>
        let entrada = document.getElementById("input-content");
        let parrafo = document.getElementById("p-text");

        function enviar() {
        // 1. Usamos .value para obtener el texto
            let mensaje = entrada.value;

        // 2. Comprobamos si el mensaje (el texto) está vacío
            if (mensaje === "") {
                alert("Has dejado el campo vacío");
            } else {

        // 3. Asignamos el texto al interior del párrafo
            parrafo.innerText = "El texto introducido es: " + mensaje;
        
        //4. Limpiar el cuadro de texto después de enviar
            entrada.value = ""; 
            }
        }
        
        
       

    </script>
</body>
</html>
